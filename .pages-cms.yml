content:
  - name: resources
    label: Recursos de Recerca
    type: collection
    path: src/content/resources
    filename: "{slug}.md"
    format: yaml-frontmatter
    fields:
      - name: published
        label: Publicat
        type: boolean
        default: true
      - name: title
        label: Titol
        type: string
      - name: type
        label: Tipus
        type: string
        options:
          choices:
            - Llibre
            - Article
            - Recurs web
            - Presentacio
            - Video
            - Quiz
      - name: dimension
        label: Dimension
        type: string
        options:
          choices:
            - Planificacio de la recerca
            - Fonamentacio teoerica
            - Disseny i aplicacio
            - Discussio i conclusions
            - Bibliografia
            - Comunicacio i TIC
      - name: subdimension
        label: Subdimension
        type: string
        required: false
      - name: level
        label: Nivell
        type: number
        options:
          min: 1
          max: 3
          step: 1
      - name: url
        label: URL
        type: string

settings:
  hide: true