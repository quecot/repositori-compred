content:
  - name: resources
    label: Recursos de Recerca
    type: collection
    path: src/content/resources
    filename: "{slug}.md"
    format: yaml-frontmatter
    fields:
      - name: published
        label: Publicat
        type: boolean
        default: true
        description: Per mostrar/amagar recursos
      - name: title
        label: Títol
        type: string
        description: Títol del recurs de recerca
        placeholder: Ex: Com fer una revisió bibliogràfica
      - name: type
        label: Tipus
        type: string
        description: Tipus de recurs
        options:
          choices:
            - Llibre
            - Article
            - Recurs web
            - Presentació
            - Vídeo
            - Quiz
      - name: dimension
        label: Dimensió
        type: string
        description: Àrea temàtica principal del recurs
        options:
          choices:
            - Planificació de la recerca
            - Fonamentació teòrica
            - Disseny i aplicació
            - Discussió i conclusions
            - Bibliografia
            - Comunicació i TIC
      - name: subdimension
        label: Subdimensió
        type: string
        description: Temàtica específica dins de la dimensió
        required: false
        placeholder: Ex: Cerca d'informació
      - name: level
        label: Nivell
        type: number
        description: Nivell de dificultat (1=bàsic, 2=intermedi, 3=avançat)
        options:
          min: 1
          max: 3
          step: 1
      - name: url
        label: URL
        type: string
        description: Enllaç al recurs extern
        placeholder: https://...

settings:
  hide: true