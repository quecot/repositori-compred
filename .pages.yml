content:
  - name: resources
    label: Recursos de Recerca
    type: collection
    path: src/content/resources
    filename: "{slug}.md"
    format: yaml-frontmatter
    fields:
      - name: published
        label: Publicat
        type: boolean
        default: true
        description: Si està marcat, el recurs apareixerà al lloc web
      - name: title
        label: Titol
        type: string
        description: Titol del recurs de recerca
        placeholder: "Ex: Com fer una revisió bibliogràfica"
      - name: type
        label: Tipus
        type: select
        description: Tipus de recurs
        options:
          values:
            - Llibre
            - Article
            - Recurs web
            - Presentació
            - Vídeo
            - Quiz
            - Altres
        required: true
      - name: dimension
        label: Dimensions
        type: select
        description: Àrea temàtica principal del recurs
        options:
          values:
            - Planificació de la recerca
            - Fonamentació teòrica
            - Disseny i aplicació
            - Discussió i conclusions
            - Bibliografia
            - Comunicació i TIC
        required: true
      - name: subdimension
        label: Subdimensió
        type: string
        description: Temàtica específica dins de la dimensió
        required: false
        placeholder: "Ex: Cerca d'informació"
      - name: level
        label: Nivell
        type: number
        description: Nivell de dificultat (1=bàsic, 2=intermedi, 3=avançat)
        options:
          min: 1
          max: 3
          step: 1
      - name: url
        label: URL
        type: string
        description: Enllaç al recurs extern
        placeholder: https://...
      - name: languages
        label: Idiomes
        type: object
        description: Idiomes disponibles
        fields:
          - name: ca
            label: Català
            type: boolean
            default: true
          - name: es
            label: Castellà
            type: boolean
          - name: en
            label: Anglès
            type: boolean

settings:
  hide: true