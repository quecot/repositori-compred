content:
  - name: resources
    label: Recursos de Recerca
    type: collection
    path: src/content/resources
    filename: "{slug}.md"
    format: yaml-frontmatter
    fields:
      - name: published
        label: Publicat
        type: boolean
        default: true
        description: Si està marcat, el recurs apareixerà al lloc web
      - name: title
        label: Titol
        type: string
        description: Titol del recurs de recerca
        placeholder: Ex: Com fer una revisio bibliografica
      - name: type
        label: Tipus
        type: select
        description: Tipus de recurs
        options:
          values:
            - Llibre
            - Article
            - Recurs web
            - Presentacio
            - Video
            - Quiz
            - Altres
        required: true
      - name: dimension
        label: Dimension
        type: select
        description: Area tematica principal del recurs
        options:
          values:
            - Planificacio de la recerca
            - Fonamentacio teoorica
            - Disseny i aplicacio
            - Discussio i conclusions
            - Bibliografia
            - Comunicacio i TIC
        required: true
      - name: subdimension
        label: Subdimension
        type: string
        description: Tematica especifica dins de la dimensio
        required: false
        placeholder: Ex: Cerca dinformacio
      - name: level
        label: Nivell
        type: number
        description: Nivell de dificultat (1=basic, 2=intermedi, 3=avancat)
        options:
          min: 1
          max: 3
          step: 1
      - name: url
        label: URL
        type: string
        description: Enllac al recurs extern
        placeholder: https://...

settings:
  hide: true